format = """($kubernetes\n)\
(${env_var.ZMX_SESSION})\
$username\
$hostname\
$directory\
${custom.jj}\
${custom.git}\
$golang\
$helm\
$java\
$python\
$rust\
$terraform\
$cmd_duration\
$line_break\
$jobs\
$character"""

palette='custom'

[palettes.custom]
overlay='{{ vars.theme_overlay }}'
text='{{ vars.theme_text }}'
color_1='{{ vars.theme_love }}'
color_2='{{ vars.theme_gold }}'
color_3='{{ vars.theme_rose }}'
color_4='{{ vars.theme_pine }}'
color_5='{{ vars.theme_foam }}'
color_6='{{ vars.theme_iris }}'

# zmx
[env_var.ZMX_SESSION]
symbol = " "
format = "[$symbol$env_value]($style) "
description = "zmx session name"
style = "bold magenta"

# K8s
[kubernetes]
disabled = false
format = '[$symbol$context \($namespace\)]($style)'
style = "bg:overlay fg:color_5"
[helm]
format = '[$symbol($version )]($style)'
style = "bg:overlay fg:color_5"

# Host
[username]
style_user = "bold fg:color_2"
format = "[$user]($style)"
[hostname]
style = "bold dimmed fg:color_3"
format = "[@$hostname]($style) "
[directory]
style = "bold fg:color_5"

# https://gitlab.com/dfontana/starjj
[custom.jj]
command = "prompt"
format = "$output"
ignore_timeout = true
shell = ["starjj"]
use_stdin = false
when = true

# Git outside Jujutsu workspaces; see starship-git.toml.
[custom.git]
command = 'env -u STARSHIP_SHELL STARSHIP_CONFIG="$HOME/.config/starship-git.toml" starship prompt'
format = "$output"
ignore_timeout = true
shell = ["zsh", "--no-rcs"]
when = "! jj root >/dev/null 2>&1"

# Langs
[golang]
format = '[$symbol($version )]($style)'
style = "bg:overlay fg:color_3"
[java]
format = '[${symbol}(${version} )]($style)'
style = "bg:overlay fg:color_3"
[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bg:overlay fg:color_3"
[rust]
format = '[$symbol($version )]($style)'
style = "bg:overlay fg:color_3"
[terraform]
format = '[$symbol$workspace]($style)'
style = "bg:overlay fg:color_3"

# Shell
[cmd_duration]
style = "bold fg:color_2"
[jobs]
style = "bold fg:color_4"
[character]
success_symbol = "[❯](bold fg:color_4)"
error_symbol = "[❯](bold fg:color_1)"

# Disabled items
[php]
disabled = true
[gcloud]
disabled = true
[docker_context]
disabled = true
