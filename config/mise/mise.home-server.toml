[vars]
pi_extensions_path = "{{ env.HOME }}/opencode/pi-extensions"

[dotfiles]
"~/.claude/settings.json" = { source = "../../agents/claude/settings.json", mode = "template" }
"~/.pi/agent/settings.json" = { source = "../../agents/pi/agent/settings.json", mode = "template" }
"~/.pi/agent/web-access.json" = "../../agents/pi/agent/web-access.json"
"~/.config/systemd/user/yt-dlp-update.service" = "tasks.d/home-server/systemd/user/yt-dlp-update.service"
"~/.config/systemd/user/yt-dlp-update.timer" = "tasks.d/home-server/systemd/user/yt-dlp-update.timer"
"~/.config/containers/systemd/*" = "tasks.d/home-server/systemd/containers/*"
"~/servers/romm/config.yml" = "tasks.d/home-server/romm/config.yml"

# Native mise unit: ~/.config/systemd/user/dev.mise.disbot-prod.service.
[bootstrap.linux.systemd.units.disbot-prod]
description = "Disbot Service File"
after = ["network.target"]
exec_start = "~/servers/disbot/disbot-prod prod --web-bind-address lan"
working_directory = "~/servers/disbot"
# mise shims first: yt-dlp is a mise-managed tool, and the shim survives the
# daily yt-dlp-update version bumps that rewrite the installs/ path. MISE_ENV is
# required too — yt-dlp is declared in mise.home-server.toml, so without it the
# shim resolves but errors with "No version is set for shim". Interactive shells
# get MISE_ENV from ~/.mise_env, which systemd does not source.
environment = { PATH = "%h/.local/share/mise/shims:/usr/local/bin:/usr/bin:%h/.local/bin", MISE_ENV = "home-server" }
restart = "always"
restart_sec = "1"

# Home-server service management (see home-server/README.md).
[task_config]
includes = [
  "~/.config/mise/tasks.d/home-server/server-units.toml",
  "~/.config/mise/tasks.d/home-server/server-init.toml",
]

[tasks.bootstrap]
description = "Converge home-server services after declarative bootstrap"
depends = ["server-units"]

[tools]
deno = "latest"
zola = "latest"

[tools."github:yt-dlp/yt-dlp"]
version = "latest"
bin = "yt-dlp"
