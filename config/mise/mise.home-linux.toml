[dotfiles]
"~/.ssh/config" = "../../home/ssh/config"
"~/.ssh/config.local" = "../../home/ssh/config.local"
"~/.local/bin/*" = "../../bin/*"
"~/.local/share/applications/*" = "../../desktops/*"
"~/.config/btop" = { source = "../../config/btop", mode = "symlink-each" }
"~/.config/dunst" = { source = "../../config/dunst", mode = "symlink-each" }
"~/.config/rofi" = { source = "../../config/rofi", mode = "symlink-each" }
"~/.config/waybar" = { source = "../../config/waybar", mode = "symlink-each" }

"~/.config/btop/btop.conf" = { source = "templates/btop/btop.conf", mode = "template" }
"~/.config/dunst/dunstrc.d/theme.conf" = { source = "templates/dunst/dunstrc.d/theme.conf", mode = "template" }
"~/.config/hypr/hyprland.conf" = { source = "templates/hypr/hyprland.conf", mode = "template" }
"~/.config/hypr/hyprlock.conf" = { source = "templates/hypr/hyprlock.conf", mode = "template" }
"~/.config/hypr/hyprpaper.conf" = { source = "templates/hypr/hyprpaper.conf", mode = "template" }
"~/.config/rofi/themes/custom.rasi" = { source = "templates/rofi/themes/custom.rasi", mode = "template" }
"~/.config/waybar/theme.css" = { source = "templates/waybar/theme.css", mode = "template" }
"~/.local/share/fonts/IosevkaCustom Nerd Font Mono/*.ttf" = "tasks.d/home-linux/fonts/ttfs/*.ttf"
"~/.local/share/fonts/Iosevka Nerd Font/*.ttf" = "tasks.d/home-linux/fonts/icons/*.ttf"
"~/.local/share/icons/*" = "tasks.d/home-linux/gtk-icons/rose-pine/icons/*-icons"

# Rose Pine icon themes (see tasks.d/home-linux/gtk-icons/README.md). Cloned
# before the [dotfiles] links above are applied.
[bootstrap.repos]
"~/.config/mise/tasks.d/home-linux/gtk-icons/rose-pine" = { url = "https://github.com/rose-pine/gtk", ref = "main" }

# Native mise unit: ~/.config/systemd/user/dev.mise.arrus.service.
# Applying bootstrap restarts it, which is appropriate for this desktop service.
[bootstrap.linux.systemd.units.arrus]
description = "RPC Impl for Vesktop"
exec_start = "~/.local/share/mise/shims/arrus"
environment = { ARRUS_DB_UPDATE_INTERVAL = "14400" }
restart = "on-failure"

[bootstrap.hooks.post-dotfiles]
run = [
  # Font cache: refresh the linked IosevkaCustom + icon font dirs
  '''
  fc-cache -f "$HOME/.local/share/fonts/IosevkaCustom Nerd Font Mono" \
    "$HOME/.local/share/fonts/Iosevka Nerd Font"
  ''',
  # GTK icon cache: refresh each linked Rose Pine icon theme
  '''
  for theme in "$HOME"/.local/share/icons/*; do
    if [ -L "$theme" ] && [ -f "$theme/index.theme" ]; then
      gtk4-update-icon-cache "$theme"
    fi
  done
  ''',
]

# Font build tasks live next to the tracked font assets.
[task_config]
includes = ["~/.config/mise/tasks.d/home-linux/fonts/tasks.toml"]

[vars]
pi_extensions_path = "{{ env.HOME }}/code/pi-extensions"

[env]
ZMX_HOST = "kossserver.home"

[tools]
btop = "latest"
"github:dfontana/arrus" = "latest"

[shell_alias]
open="xdg-open"
pbcopy="wl-copy"
pbpaste="wl-paste"
