## Tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map cmd+shift+t>r set_tab_title
map cmd+shift+t>x close_tab
map cmd+shift+t>t new_tab
map cmd+shift+t>right next_tab
map cmd+shift+t>left previous_tab
map cmd+shift+t>shift+right move_tab_forward
map cmd+shift+t>shift+left move_tab_backward

## Copy/Paste
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

## Panes
map cmd+shift+p>r set_window_title
map cmd+shift+p>x close_window
map cmd+shift+p>h launch --location=hsplit --cwd=current
map cmd+shift+p>v launch --location=vsplit --cwd=current
map cmd+shift+p>right move_window right
map cmd+shift+p>left move_window left
map cmd+shift+p>up move_window up
map cmd+shift+p>down move_window down

### Move between panes, even when in editor
map shift+left neighboring_window left
map shift+right neighboring_window right
map shift+up neighboring_window up
map shift+down neighboring_window down
map --when-focus-on title:hx.* shift+left neighboring_window left
map --when-focus-on title:hx.* shift+right neighboring_window right
map --when-focus-on title:hx.* shift+up neighboring_window up
map --when-focus-on title:hx.* shift+down neighboring_window down

### Resizing
map cmd+shift+r start_resizing_window

## Remote zmx sessions — cmd+shift+w prefix
# Close a pane  → detach (session keeps running remotely)
# exit / Ctrl-D → kill that session
# quit kitty    → detach everything at once
#
# zp auto-names the session (p<HHMMSS>); type zp myname in a pane for durable sessions.
map cmd+shift+w>h launch --location=hsplit zsh -ic zp
map cmd+shift+w>v launch --location=vsplit zsh -ic zp
# Resume: hsplit with the remote fzf session picker
map cmd+shift+w>r send_text all \x15zpick\r
# Detach all: drop the SSH ControlMaster (all sessions persist remotely)
map cmd+shift+w>d launch --type=overlay zsh -ic zd
# Layout save (overlay — needs real window context for kitten @) / restore (hsplit)
map cmd+shift+w>s launch --type=overlay zsh -ic zls
map cmd+shift+w>o launch --type=overlay  zsh -ic zlr
