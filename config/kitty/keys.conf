# Key binds
# clear_all_shortcuts yes

# Semantic names are also used by the mode-hint tab bar.
action_alias tab_rename combine : pop_keyboard_mode : set_tab_title
action_alias tab_close combine : pop_keyboard_mode : close_tab
action_alias tab_new combine : pop_keyboard_mode : new_tab
action_alias pane_rename combine : pop_keyboard_mode : set_window_title
action_alias pane_close combine : pop_keyboard_mode : close_window
action_alias pane_horizontal_split combine : pop_keyboard_mode : launch --location=hsplit --cwd=current
action_alias pane_vertical_split combine : pop_keyboard_mode : launch --location=vsplit --cwd=current
action_alias pane_local_horizontal_split combine : pop_keyboard_mode : launch --location=hsplit
action_alias pane_local_vertical_split combine : pop_keyboard_mode : launch --location=vsplit
map alt+shift+r load_config_file

## Layout
map alt+l next_layout

## Tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Tab mode
map --new-mode tab cmd+shift+t
map --mode tab esc pop_keyboard_mode
map --mode tab enter pop_keyboard_mode
map --mode tab cmd+shift+t pop_keyboard_mode
map --mode tab cmd+shift+p combine : pop_keyboard_mode : push_keyboard_mode pane
map --mode tab cmd+shift+w combine : pop_keyboard_mode : launch --location=hsplit zsh -ic zx
map --mode tab cmd+shift+r combine : pop_keyboard_mode : push_keyboard_mode resize
map --mode tab r tab_rename
map --mode tab x tab_close
map --mode tab t tab_new
map --mode tab right next_tab
map --mode tab left previous_tab
map --mode tab shift+right move_tab_forward
map --mode tab shift+left move_tab_backward

## Copy/Paste
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

## Panes
# Pane mode
map --new-mode pane cmd+shift+p
map --mode pane esc pop_keyboard_mode
map --mode pane enter pop_keyboard_mode
map --mode pane cmd+shift+p pop_keyboard_mode
map --mode pane cmd+shift+t combine : pop_keyboard_mode : push_keyboard_mode tab
map --mode pane cmd+shift+w combine : pop_keyboard_mode : launch --location=hsplit zsh -ic zx
map --mode pane cmd+shift+r combine : pop_keyboard_mode : push_keyboard_mode resize
map --mode pane r pane_rename
map --mode pane x pane_close
map --mode pane h pane_horizontal_split
map --mode pane v pane_vertical_split
map --mode pane shift+h pane_local_horizontal_split
map --mode pane shift+v pane_local_vertical_split
map --mode pane right move_window right
map --mode pane left move_window left
map --mode pane up move_window up
map --mode pane down move_window down

### Move between panes, even when in editor
map shift+left neighboring_window left
map shift+right neighboring_window right
map shift+up neighboring_window up
map shift+down neighboring_window down
map --when-focus-on title:hx.* shift+left neighboring_window left
map --when-focus-on title:hx.* shift+right neighboring_window right
map --when-focus-on title:hx.* shift+up neighboring_window up
map --when-focus-on title:hx.* shift+down neighboring_window down

### Resizing
# Resize mode
map --new-mode resize cmd+shift+r
map --mode resize esc pop_keyboard_mode
map --mode resize enter pop_keyboard_mode
map --mode resize cmd+shift+r pop_keyboard_mode
map --mode resize cmd+shift+t combine : pop_keyboard_mode : push_keyboard_mode tab
map --mode resize cmd+shift+p combine : pop_keyboard_mode : push_keyboard_mode pane
map --mode resize cmd+shift+w combine : pop_keyboard_mode : launch --location=hsplit zsh -ic zx
map --mode resize left resize_window narrower
map --mode resize right resize_window wider
map --mode resize up resize_window taller
map --mode resize down resize_window shorter

## Remote zmx sessions
# Start zx in a new local pane even when the focused pane is remote.
map cmd+shift+w launch --location=hsplit zsh -ic zx
