[[language]]
name = "python"
# roots = ["pyproject.toml", "setup.py", "Poetry.lock", ".git"]
# file-types = ["py"]
comment-token = "#"
language-servers = ["ty"]
auto-format = true
formatter = {command = 'ruff', args = ["--quiet", "-"]}

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.pyright.config]
reportMissingTypeStubs = false

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"
autoImportCompletions = true

[language-server.fennel-ls]
command = "fennel-ls"

[[language]]
name = "fennel"
scope = "source.fennel"
file-types = ["fnl"]
language-servers = ["fennel-ls"]

[[language]]
name = "roc"
scope = "source.roc"
injection-regex = "roc"
file-types = ["roc"]
shebangs = ["roc"]
roots = []
comment-token = "#"
language-servers = ["roc-ls"]
indent = { tab-width = 2, unit = " " }
auto-format = true
formatter = { command = "roc", args =[ "format", "--stdin", "--stdout"]}

[language-server.roc-ls]
command = "roc_language_server"

[language-server.merman-lsp]
command = "merman-lsp"

# Not a real language server: it bridges Helix's stdio to the `gph lsp` daemon
# socket so the Kitty preview pane sees unsaved buffer text. It advertises full
# text sync only, so merman-lsp stays the diagnostics provider. Requires `gph
# lsp` already running in a Kitty pane at the workspace root; without it,
# lsp-connect just reports the daemon is missing.
[language-server.gph-preview]
command = "gph"
args = ["lsp-connect"]

# Helix does not start language servers inside injections, so the fence support
# comes from attaching merman-lsp to markdown itself; it reads mermaid fences
# out of the markdown document.
[[language]]
name = "mermaid"
language-servers = ["merman-lsp", "gph-preview"]

[[language]]
name = "markdown"
language-servers = ["merman-lsp"]

[language-server.lua-language-server]
command = "lua-language-server"

[language-server.lua-language-server.config.Lua]
runtime = { version = "Lua 5.4" }
diagnostics = { globals = ["vim"] }
workspace = { ignoreDir = [".jj", ".git"] }
telemetry = { enable = false }

[[language]]
name = "lua"
scope = "source.lua"
file-types = ["lua"]
comment-token = "--"
language-servers = ["lua-language-server"]
indent = { tab-width = 2, unit = "  " }
auto-format = true

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'

[[grammar]]
name = "roc"
source = { git = "https://github.com/faldor20/tree-sitter-roc.git", rev = "ef46edd0c03ea30a22f7e92bc68628fb7231dc8a" }
